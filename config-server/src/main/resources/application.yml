server:
  port: 8888
spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/6pm-sparta/6pm-config.git
          default-label: main
          username: ${CONFIG_GIT_USERNAME:}
          password: ${CONFIG_GIT_TOKEN:}

management:
  tracing:
    sampling:
      probability: 0.1     # 100% → 10%. 부하 중 Zipkin 추적