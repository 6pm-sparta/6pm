management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


# config-server/src/main/resources/config/application.yml

# UserIdCard HMAC 서명 공유 키. Gateway가 서명하고 모든 도메인 서비스가 검증한다.
# 모든 서비스가 동일한 키를 써야 하므로 Config Server에서 중앙 관리한다. (common-auth.md 참고)
# TODO: 운영 시에는 환경변수/시크릿 매니저로 분리 (평문 금지)
hmac:
  secret-key: 6pm-fandom-sns-hmac-shared-secret-key-must-be-at-least-32-bytes-long
