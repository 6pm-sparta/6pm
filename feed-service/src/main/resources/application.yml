# feed-service/src/main/resources/application.yml — 표준 와이어링 (인프라 담당 제공)
server:
  port: 8082

spring:
  application:
    name: feed-service
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/fandom_db?currentSchema=feed_db
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: feed_db
        format_sql: true
    show-sql: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
logging:
  file:
    name: ./logs/feed-service.log
  structured:
    format:
      file: ecs
  level:
    root: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}
      base-url: https://${AWS_S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com/

cache:
  ttl:
    default: 600  # 10분
    post-detail: 3600  # 60분
    post-list: 300  # 5분
    comment-count: 300  # 5분

scheduler:
  like-sync:
    fixed-delay: 300  # 5분