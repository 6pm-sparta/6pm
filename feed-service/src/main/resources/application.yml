# feed-service/src/main/resources/application.yml — 표준 와이어링 (인프라 담당 제공)
server:
  port: 8082

spring:
  application:
    name: feed-service
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/fandom_db?currentSchema=feed_db
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: feed_db
        format_sql: true
        jdbc:
          batch_size: 50
    show-sql: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: feed-service
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    listener:
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 1000
          multiplier: 2.0

logging:
  file:
    name: ./logs/feed-service.log
  structured:
    format:
      file: ecs
  level:
    root: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

resilience4j:
  retry:
    instances:
      userClient:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - com.fandom.common.exception.CustomException  # 404 같은 비즈니스 예외는 재시도 없음
  circuitbreaker:
    instances:
      userClient:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}
      base-url: https://${AWS_S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com/
      path:
        post: posts
      presigned-url-expiry: 600  # 10분

broadcast:
  fanout-threshold: 10000
  chunk-size: 500

cache:
  ttl:
    default: 600  # 10분
    post-detail: 3600  # 60분
    post-list: 300  # 5분
    comment-count: 300  # 5분

scheduler:
  like-sync:
    fixed-delay: 300  # 5분
  outbox-publish:
    fixed-delay: 5  # 5초