spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false

cloud:
  aws:
    credentials:
      access-key: temp-access-key
      secret-key: temp-secret-key
    region:
      static: ap-northeast-2
    s3:
      bucket: temp-bucket
      base-url: https://temp-bucket.s3.ap-northeast-2.amazonaws.com/

cache:
  ttl:
    default: 600  # 10분
    post-detail: 3600  # 60분
    post-list: 300  # 5분
    comment-count: 300  # 5분

scheduler:
  like-sync:
    fixed-delay: 5  # 5초