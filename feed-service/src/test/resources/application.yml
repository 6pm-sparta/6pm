spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: feed-service-test
    listener:
      auto-startup: false

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false

cloud:
  aws:
    credentials:
      access-key: temp-access-key
      secret-key: temp-secret-key
    region:
      static: ap-northeast-2
    endpoint: http://localhost:4566
    s3:
      bucket: temp-bucket
      base-url: https://temp-bucket.s3.ap-northeast-2.amazonaws.com/
      path:
        post: posts
      presigned-url-expiry: 600  # 10분

cache:
  ttl:
    default: 600  # 10분
    post-detail: 3600  # 60분
    post-list: 300  # 5분
    comment-count: 300  # 5분

scheduler:
  like-sync:
    fixed-delay: 5  # 5초
  outbox-publish:
    fixed-delay: 5  # 5초