server:
  # ? ?? ????: ?? ???? ?? ??? ??? ?????!
  # (user=8081, feed=8082, ticketing=8083, order=8084, notification=8085)
  port: 8083

spring:
  application:
    # ? ?? ????: ?? ??? ???? ??? ?????!
    name: ticketing-service

  # ? Java 21 ?? ??? ??? (?? ???)
  threads:
    virtual:
      enabled: true

  # ? 1. PostgreSQL DB ?? (?? DB ??)
  datasource:
    driver-class-name: org.postgresql.Driver
    # ?????(??)?? ??? ????? localhost ??
    url: jdbc:postgresql://localhost:5432/fandom_db
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update # ?? ?????? update (?? ?? ??? validate? ??)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ? 2. Redis ?? (???? ???? ?? ??)
  data:
    redis:
      host: localhost
      port: 6379
      password: fandom_redis_pw

  # ? 3. Kafka ?? (???? ???? ?? ??)
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ${spring.application.name}-group
      auto-offset-reset: earliest
    producer:
      # ???? JSON ??? ???? ?? ??? ??
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ? 4. Eureka (??? ???) ??
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    # MSA?? ???? ??? ??? ?? ?? ? ??
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

# ?? 5. ??? (AIOps ? Prometheus ???)
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}