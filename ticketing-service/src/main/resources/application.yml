# ticketing-service/src/main/resources/application.yml — 표준 와이어링 (인프라 담당 제공)
server:
  port: 8083

spring:
  application:
    name: ticketing-service
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ticket_db
        format_sql: true
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

# kafka 직렬화 문제 해결을 위한 임시 설정 추후 팀 컨벤션에 맞추어 수정 예정
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ticketing-service

logging:
  file:
    name: ./logs/ticketing-service.log
  structured:
    format:
      file: ecs
  level:
    root: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 0.05 # stress 측정에서는 더 낮게 설정 예정
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans