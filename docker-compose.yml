# =====================================================================
# 6pm MSA Docker Compose (보강판) — Profile 기반
# =====================================================================
# 변경점 vs 기존:
#   + postgres 에 init-db.sql 마운트(서비스별 스키마 자동 생성)
#   + Loki / Promtail / Alertmanager 추가 (o11y 프로파일)
#   + prometheus 가 alertmanager 와 연동되도록 alertmanager.yml 추가
#   + gateway 포트 8080 으로 통일
#   + [신규] core/apps 9개 서비스의 build 를 공통 멀티스테이지 Dockerfile 로 연결
#           (멀티모듈이라 context 는 레포 루트, 모듈 구분은 args.SERVICE)
# 사용법:
#   인프라만:        docker compose --profile infra up -d
#   인프라+관측:     docker compose --profile infra --profile o11y up -d
#   전체:            docker compose --profile all up -d --build
# =====================================================================

services:
  # ---------------------------------------------------------------
  # 1. INFRA (DB & Middleware)
  # ---------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    profiles: ["infra", "all"]
    container_name: 6pm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fandom_db
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    profiles: ["infra", "all"]
    container_name: 6pm-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass fandom_redis_pw

  kafka:
    image: apache/kafka:3.7.0
    profiles: ["infra", "all"]
    container_name: 6pm-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["infra", "all"]
    container_name: 6pm-kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=6pm-local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka

  zipkin:
    image: openzipkin/zipkin:latest
    profiles: ["infra", "all"]
    container_name: 6pm-zipkin
    ports:
      - "9411:9411"

  # ---------------------------------------------------------------
  # 2. CORE (Spring Cloud 인프라)
  # ---------------------------------------------------------------
  eureka-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: eureka-server
    profiles: ["core", "all"]
    container_name: 6pm-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  config-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: config-server
    profiles: ["core", "all"]
    container_name: 6pm-config
    ports:
      - "8888:8888"

  gateway-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: gateway-service
    profiles: ["core", "all"]
    container_name: 6pm-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server

  # ---------------------------------------------------------------
  # 3. APPS (비즈니스 마이크로서비스)
  # ---------------------------------------------------------------
  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: user-service
    profiles: ["apps", "all"]
    container_name: 6pm-user
    ports: ["8081:8081"]

  feed-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: feed-service
    profiles: ["apps", "all"]
    container_name: 6pm-feed
    ports: ["8082:8082"]

  ticketing-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: ticketing-service
    profiles: ["apps", "all"]
    container_name: 6pm-ticketing
    ports: ["8083:8083"]
    env_file:
      - .env

  order-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: order-service
    profiles: ["apps", "all"]
    container_name: 6pm-order
    ports: ["8084:8084"]

  notification-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: notification-service
    profiles: ["apps", "all"]
    container_name: 6pm-notification
    ports: ["8085:8085"]

  aiops-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: aiops-service
    profiles: ["apps", "all"]
    container_name: 6pm-aiops
    ports: ["8086:8086"]

  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: auth-service
    profiles: ["apps", "all"]
    container_name: 6pm-auth
    ports: ["8087:8087"]

  # ---------------------------------------------------------------
  # 4. O11Y (관측성)
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
#      - ./infra/alert-rules.yml:/etc/prometheus/alert-rules.yml
#    depends_on:
#      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  loki:
    image: grafana/loki:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./infra/loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-promtail
    volumes:
      - ./infra/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
#      - loki

volumes:
  postgres_data:
  kafka_data:
  loki_data:
