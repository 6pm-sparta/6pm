# =====================================================================
# 6pm MSA Docker Compose — Profile 기반
# =====================================================================
# 리뷰 반영(2026-06-22):
#   * postgres 17-alpine 유지(다운그레이드 아님)
#   * DB/Redis 비밀번호를 .env 로 분리(하드코딩 제거)
#   * kafka dual-listener(INTERNAL kafka:29092 / EXTERNAL localhost:9092) 복구
#     → kafka-ui 가 kafka:29092 로 접속(단일 리스너면 ui 연결 실패)
#   * auth-service 복구 (chat-service 는 레포 모듈 유무 확인 후 처리 — 아래 주석)
#   * o11y(prometheus/alertmanager/loki/promtail/grafana) 유지
# 사용법:
#   인프라만:        docker compose --profile infra up -d
#   인프라+관측:     docker compose --profile infra --profile o11y up -d
#   전체:            docker compose --profile all up -d --build
# 비밀번호 등 비밀값은 같은 폴더의 .env 에 둔다(레포엔 .env.example 만 커밋).
# =====================================================================

services:
  # ---------------------------------------------------------------
  # 1. INFRA (DB & Middleware)
  # ---------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    profiles: ["infra", "all"]
    container_name: 6pm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # .env 에서 주입
      POSTGRES_DB: ${POSTGRES_DB:-fandom_db}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    profiles: ["infra", "all"]
    container_name: 6pm-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}   # .env 에서 주입

  kafka:
    image: apache/kafka:3.7.0
    profiles: ["infra", "all"]
    container_name: 6pm-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # dual-listener: 컨테이너 내부는 INTERNAL(kafka:29092), 호스트는 EXTERNAL(localhost:9092)
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["infra", "all"]
    container_name: 6pm-kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=6pm-local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka

  zipkin:
    image: openzipkin/zipkin:latest
    profiles: ["infra", "all"]
    container_name: 6pm-zipkin
    ports:
      - "9411:9411"

  # ---------------------------------------------------------------
  # 2. CORE (Spring Cloud 인프라)
  # ---------------------------------------------------------------
  eureka-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: eureka-server
    profiles: ["core", "all"]
    container_name: 6pm-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  config-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: config-server
    profiles: ["core", "all"]
    container_name: 6pm-config
    ports:
      - "8888:8888"

  gateway-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: gateway-service
    profiles: ["core", "all"]
    container_name: 6pm-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server

  # ---------------------------------------------------------------
  # 3. APPS (비즈니스 마이크로서비스)
  # ---------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: auth-service
    profiles: ["apps", "all"]
    container_name: 6pm-auth
    ports: ["8087:8087"]                # ← develop 값으로 맞추세요

  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: user-service
    profiles: ["apps", "all"]
    container_name: 6pm-user
    ports: ["8081:8081"]

  feed-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: feed-service
    profiles: ["apps", "all"]
    container_name: 6pm-feed
    ports: ["8082:8082"]

  ticketing-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: ticketing-service
    profiles: ["apps", "all"]
    container_name: 6pm-ticketing
    ports: ["8083:8083"]

  order-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: order-service
    profiles: ["apps", "all"]
    container_name: 6pm-order
    ports: ["8084:8084"]

  notification-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: notification-service
    profiles: ["apps", "all"]
    container_name: 6pm-notification
    ports: ["8085:8085"]

  aiops-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: aiops-service
    profiles: ["apps", "all"]
    container_name: 6pm-aiops
    ports: ["8086:8086"]

  # chat-service: 레포에 모듈이 있으면 위 auth-service 형식으로 복구(SERVICE/포트만 변경).
  #   레포에 아직 없으면 compose에서 빼는 게 맞고, 리뷰어에는 "미구현 서비스라 제외"로 답변.
  #   (develop 의 정의가 있으면 그걸 그대로 가져오는 게 가장 안전)

  # ---------------------------------------------------------------
  # 4. O11Y (관측성)
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/alert-rules.yml:/etc/prometheus/alert-rules.yml
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  loki:
    image: grafana/loki:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./infra/loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-promtail
    volumes:
      - ./infra/promtail-config.yml:/etc/promtail/config.yml
      - .:/hostlogs:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  kafka_data:
  loki_data:
