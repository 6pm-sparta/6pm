version: '3.8'

# =================================================================
# 🚀 6pm MSA Docker Compose (Profile-based Architecture)
# =================================================================
# [사용법]
# 1. 인프라만 띄울 때 (로컬 개발용): docker compose --profile infra up -d
# 2. 관측성까지 띄울 때 (모니터링용): docker compose --profile infra --profile o11y up -d
# 3. 전체 다 띄울 때 (통합 부하 테스트용): docker compose --profile all up -d
# =================================================================

services:
  # ---------------------------------------------------------------
  # 🏢 1. INFRA Profile (DB & Middleware) - 아키텍처의 프라이빗 & 미들웨어 영역
  # ---------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    profiles: ["infra", "all"]
    container_name: 6pm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fandom_db
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["infra", "all"]
    container_name: 6pm-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass fandom_redis_pw

  # ⚡ Kafka (Zookeeper 없는 최신 KRaft 모드)
  kafka:
    image: bitnami/kafka:3.7.0
    profiles: ["infra", "all"]
    container_name: 6pm-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092 # 팀원 로컬 접속용
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    volumes:
      - kafka_data:/bitnami/kafka

  # 👁️ Kafka UI (웹 대시보드)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["infra", "all"]
    container_name: 6pm-kafka-ui
    ports:
      - "8090:8080" # localhost:8090 접속
    environment:
      - KAFKA_CLUSTERS_0_NAME=6pm-local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

  # 🔍 Zipkin (분산 추적 - 다이어그램 반영)
  zipkin:
    image: openzipkin/zipkin:latest
    profiles: ["infra", "all"]
    container_name: 6pm-zipkin
    ports:
      - "9411:9411"

  # ---------------------------------------------------------------
  # 🌐 2. CORE Profile (Spring Cloud 인프라) - Application 영역 상단
  # ---------------------------------------------------------------
  eureka-server:
    build: ./eureka-server # 도커 이미지 빌드 경로
    profiles: ["core", "all"]
    container_name: 6pm-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  config-server:
    build: ./config-server # 다이어그램에 있는 Config Server
    profiles: ["core", "all"]
    container_name: 6pm-config
    ports:
      - "8888:8888"

  gateway-service:
    build: ./gateway-service
    profiles: ["core", "all"]
    container_name: 6pm-gateway
    ports:
      - "8000:8000"
    depends_on:
      - eureka-server

  # ---------------------------------------------------------------
  # 📦 3. APPS Profile (비즈니스 마이크로서비스) - Application 영역 하단
  # ---------------------------------------------------------------
  user-service:
    build: ./user-service
    profiles: ["apps", "all"]
    container_name: 6pm-user
    ports:
      - "8081:8081"

  feed-service:
    build: ./feed-service
    profiles: ["apps", "all"]
    container_name: 6pm-feed
    ports:
      - "8082:8082"

  ticketing-service:
    build: ./ticketing-service
    profiles: ["apps", "all"]
    container_name: 6pm-ticketing
    ports:
      - "8083:8083"

  order-service:
    build: ./order-service
    profiles: ["apps", "all"]
    container_name: 6pm-order
    ports:
      - "8084:8084"

  notification-service:
    build: ./notification-service
    profiles: ["apps", "all"]
    container_name: 6pm-notification
    ports:
      - "8085:8085"

  aiops-service:
    build: ./aiops-service
    profiles: ["apps", "all"]
    container_name: 6pm-aiops
    ports:
      - "8086:8086"

  # ---------------------------------------------------------------
  # 🔭 4. O11Y Profile (Observability 관측성) - 우측 하단 영역
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # 프로메테우스 설정 파일 필요

  grafana:
    image: grafana/grafana:latest
    profiles: ["o11y", "all"]
    container_name: 6pm-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

# 볼륨(데이터 영구 저장) 설정
volumes:
  postgres_data:
  kafka_data: