$kind: http-request
url: "{{orderServiceUrl}}/api/v1/payments/{{paymentId}}"
method: GET
headers:
  Authorization: Bearer {{userA_token}}
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () { pm.response.to.have.status(200); }); const data = pm.response.json().data; pm.test("paymentStatus는 REFUNDED", function () { pm.expect(data.paymentStatus).to.eql("REFUNDED"); }); pm.test("refundAmount 채워짐", function () { pm.expect(data.refundAmount).to.not.be.null; });
    language: text/javascript
order: 3000
