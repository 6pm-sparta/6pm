$kind: collection
description: |-
  A가 시나리오 7에서 확정한 예매로 주문 취소 요청 → A가 예매 취소 알림 수신

  1. CONFIRMED 상태 주문으로 취소 요청
      
  2. DB에서 주문 상태 REFUND_REQUESTED 확인
      
  3. 1.5초 대기 — MockPG 환불 웹훅 자동 수신
      
  4. DB에서 주문 상태 REFUNDED 확인, refund_amount 채워졌는지 확인
      
  5. Kafka UI에서 `order.payment.cancelled` 확인 (좌석 반환)
      
  6. Redis에서 해당 좌석 키 삭제, inventory 증가 확인
      
  7. Kafka UI에서 `notification.send` (ORDER_CANCELED) 확인
      
  8. 알림 보관함에서 취소 알림 수신 확인
variables:
  paymentId: ""
