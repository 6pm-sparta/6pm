$kind: http-request
name: "알림보관함 조회 - 예매취소(ORDER_CANCELED) 알림 수신 확인"
url: "{{baseUrl}}/api/v1/notifications"
method: GET
headers:
  Authorization: "Bearer {{userA_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); });"
    language: text/javascript
order: 4000
