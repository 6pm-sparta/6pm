$kind: http-request
name: "에러케이스 - 탈퇴한 A의 토큰으로 내정보 조회 시도 → 실패 확인"
url: "{{baseUrl}}/api/v1/members/me"
method: PATCH
headers:
  Authorization: "Bearer {{userA_token}}"
body:
  type: json
  content: "{\"address1\": \"서울시 종로구\"}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 4xx (탈퇴된 계정)\", function () { pm.expect(pm.response.code).to.be.within(400, 499); });"
    language: text/javascript
order: 3000
