$kind: http-request
name: 7-0. 주문 직접 생성 (Feign 우회 - order-service 직접 호출)
url: "{{ORDER_SERVICE_URL}}/internal/v1/orders"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "holdId": "11111111-1111-1111-1111-111111111111",
      "seatId": "22222222-2222-2222-2222-222222222222",
      "userId": "{{MEMBER_A_ID}}",
      "totalAmount": 50000
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201 || pm.response.code === 200) {
        const d = pm.response.json().data;
        pm.collectionVariables.set("ORDER_ID", d.orderId);
        console.log("ORDER_ID:", d.orderId);
      }
    language: text/javascript
order: 1000
