$kind: http-request
name: "동일 Idempotency-Key로 결제 재요청 -> 200 응답 (멱등성 확인)"
url: "{{orderServiceUrl}}/api/v1/payments"
method: POST
headers:
  Authorization: "Bearer {{userA_token}}"
  Idempotency-Key: "{{idempotencyKey}}"
body:
  type: json
  content: "{\"orderId\": \"{{orderId}}\", \"paymentMethod\": \"CARD\"}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200 (신규 처리 아님, 멱등 응답)\", function () { pm.response.to.have.status(200); }); pm.test(\"동일 paymentId 반환\", function () { pm.expect(pm.response.json().data.paymentId).to.eql(pm.collectionVariables.get(\"paymentId\")); });"
    language: text/javascript
order: 6000
