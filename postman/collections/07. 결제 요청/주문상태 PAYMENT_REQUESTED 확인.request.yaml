$kind: http-request
name: 주문상태 PAYMENT_REQUESTED 확인
url: "{{baseUrl}}/api/v1/orders/{{orderId}}"
method: GET
headers:
  Authorization: "Bearer {{userA_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); }); pm.test(\"주문 상태는 PAYMENT_REQUESTED\", function () { pm.expect(pm.response.json().data.status).to.eql(\"PAYMENT_REQUESTED\"); });"
    language: text/javascript
order: 2000
