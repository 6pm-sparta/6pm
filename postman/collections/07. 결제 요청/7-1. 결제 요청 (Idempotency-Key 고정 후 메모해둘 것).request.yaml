$kind: http-request
name: 7-1. 결제 요청 (Idempotency-Key 고정 후 메모해둘 것)
url: "{{B}}/api/v1/payments"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{MEMBER_A_TOKEN}}
  Idempotency-Key: test-idem-key-001
body:
  type: text
  content: |-
    {
      "orderId": "{{ORDER_ID}}",
      "paymentMethod": "CARD"
    }
order: 5000
