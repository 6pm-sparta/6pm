$kind: http-request
name: "디바이스 토큰 삭제 (hard delete)"
url: "{{baseUrl}}/api/v1/notifications/tokens/{{deviceTokenId}}"
method: DELETE
headers:
  Authorization: "Bearer {{userA_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); });"
    language: text/javascript
order: 3000
