$kind: http-request
url: "{{baseUrl}}/api/v1/auth/logout"
method: POST
headers:
  Authorization: Bearer {{userA_token}}
body:
  type: json
  content: '{"refreshToken": "{{userA_refresh}}"}'
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
    language: text/javascript
order: 2000
