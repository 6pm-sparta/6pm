$kind: http-request
name: 에러케이스 - 로그아웃된 access 토큰으로 내정보 변경 시도 → 실패 확인
url: "{{baseUrl}}/api/v1/members/me"
method: PATCH
headers:
  Authorization: Bearer {{userA_token}}
body:
  type: json
  content: '{"address1": "서울시 종로구"}'
scripts:
  - type: afterResponse
    code: pm.test("Status code is 401 (블랙리스트된 토큰)", function () { pm.response.to.have.status(401); });
    language: text/javascript
order: 3000
