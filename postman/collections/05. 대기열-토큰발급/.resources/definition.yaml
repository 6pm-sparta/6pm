description: |-
  A가 대기열 등록

  티켓팅 대기열 통과(에러케이스 위주)

  1. 대기열 진입
      
  2. 순번 조회 (Redis에서 Sorted Set 확인)
      
  3. 구매 토큰 발급 (스케줄러 대기 or Redis 수동 세팅)
      
  4. 에러케이스 — 구매 토큰 없는 유저가 선점 시도 → 실패
      
  5. 에러케이스 — 이미 선점된 좌석 재선점 시도 → 실패
      
  6. 에러케이스 — 재고 없음 → 실패
