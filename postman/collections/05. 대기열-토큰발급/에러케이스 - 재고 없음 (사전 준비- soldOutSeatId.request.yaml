$kind: http-request
name: "에러케이스 - 재고 없음 (사전 준비: soldOutSeatId 환경변수에 이미 SOLD 상태인 좌석ID 직접 세팅 필요)"
url: "{{baseUrl}}/api/v1/tickets/shows/{{showId}}/seats/{{soldOutSeatId}}/hold"
method: POST
headers:
