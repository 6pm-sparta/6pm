$kind: http-request
url: "{{baseUrl}}/api/v1/tickets/shows/{{showId}}/queue/status"
method: GET
headers:
  Authorization: Bearer {{userA_token}}
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () { pm.response.to.have.status(200); }); const data = pm.response.json().data; pm.collectionVariables.set("queueRank", data.rank); pm.collectionVariables.set("queueIsReady", data.isReady);
    language: text/javascript
order: 2000
