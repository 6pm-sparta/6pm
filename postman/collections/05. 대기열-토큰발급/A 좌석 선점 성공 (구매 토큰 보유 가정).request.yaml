$kind: http-request
name: A 좌석 선점 성공 (구매 토큰 보유 가정)
url: "{{baseUrl}}/api/v1/tickets/shows/{{showId}}/seats/{{seatId}}/hold"
method: POST
headers:
  Authorization: Bearer {{userA_token}}
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () { pm.response.to.have.status(200); }); pm.environment.set("orderId", pm.response.json().data.orderId);
    language: text/javascript
order: 5000
