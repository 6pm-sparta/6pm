$kind: http-request
url: "{{baseUrl}}/api/v1/tickets/shows/{{showId}}/seats/{{seatId}}/hold"
method: POST
headers:
  Authorization: Bearer {{userB_token}}
scripts:
  - type: prerequest
    code: |-
      // B가 직전 단계(대기열 진입)에서 받은 순번이 스케줄러(QUEUE_SCHEDULER_DELAY)에 의해
      // 구매 토큰으로 전환될 시간을 확보한다. 이게 없으면 토큰 체크가 좌석상태 체크보다
      // 먼저 실행되어 의도한 SEAT_ALREADY_HELD(409)가 아니라 PURCHASE_TOKEN_NOT_FOUND(403)가 뜬다.
      const waitMs = 2500;
      const start = Date.now();
      while (Date.now() - start < waitMs) { /* busy-wait */ }
    language: text/javascript
  - type: afterResponse
    code: pm.test("Status code is 4xx (실패해야 함)", function () { pm.expect(pm.response.code).to.be.within(400, 499); });
    language: text/javascript
order: 6000
