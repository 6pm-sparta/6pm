$kind: http-request
url: "{{baseUrl}}/api/v1/members"
method: POST
body:
  type: json
  content: '{"email": "{{userB_email}}", "password": "{{userB_password}}", "nickname": "userB", "zipCode": "54321", "address1": "서울시 마포구", "address2": "202호"}'
scripts:
