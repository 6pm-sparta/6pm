$kind: http-request
name: 일반회원A 가입
url: "{{baseUrl}}/api/v1/members"
method: POST
body:
  type: json
  content: "{\r

    \    \"email\": \"{{userA_email}}\",\r

    \    \"password\": \"{{userA_password}}\",\r

    \    \"nickname\": \"userA\",\r

    \    \"zipCode\": \"12345\",\r

    \    \"address1\": \"서울시 강남구\",\r

    \    \"address2\": \"101호\"\r

    }"
scripts:
  - type: afterResponse
    code: pm.test("Status code is 201", function () { pm.response.to.have.status(201); }); pm.collectionVariables.set("userA_id", pm.response.json().data.userId);
    language: text/javascript
order: 2000
