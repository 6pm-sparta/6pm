$kind: http-request
name: 주문조회 - DB에서 PENDING 자동생성 확인 (Feign 연동)
url: "{{baseUrl}}/api/v1/orders/{{orderId}}"
method: GET
headers:
  Authorization: "Bearer {{userA_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); }); const data = pm.response.json().data; pm.test(\"주문 상태는 PENDING\", function () { pm.expect(data.status).to.eql(\"PENDING\"); }); pm.test(\"seatId 일치\", function () { pm.expect(data.seatId).to.eql(pm.collectionVariables.get(\"seatId\")); });"
    language: text/javascript
order: 3000
