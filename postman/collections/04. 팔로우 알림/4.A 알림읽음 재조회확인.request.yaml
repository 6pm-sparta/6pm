$kind: http-request
name: "A 알림 재조회 - isRead true 확인"
url: "{{baseUrl}}/api/v1/notifications"
method: GET
headers:
  Authorization: "Bearer {{userA_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); }); const list = pm.response.json().data.notifications; const target = list.find(n => n.id === pm.collectionVariables.get(\"notificationId\")); pm.test(\"isRead가 true로 바뀜\", function () { pm.expect(target.isRead).to.eql(true); });"
    language: text/javascript
order: 2500
