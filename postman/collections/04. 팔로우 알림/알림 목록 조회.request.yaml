$kind: http-request
name: 알림 목록 조회
url: "{{baseUrl}}/api/v1/notifications"
method: GET
headers:
  Authorization: "Bearer {{userA_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); }); const notifications = pm.response.json().data.notifications; if (notifications && notifications.length > 0) { pm.collectionVariables.set(\"notificationId\", notifications[0].id); }"
    language: text/javascript
order: 1000
