$kind: http-request
name: "A 게시글목록조회 2회차 (캐시 사용 여부 확인 - 응답시간 비교)"
url: "{{baseUrl}}/api/v1/feeds/posts"
method: GET
headers:
  Authorization: "Bearer {{userA_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); }); const first = pm.collectionVariables.get(\"firstCallTime\"); console.log(\"1차:\", first, \"ms / 2차:\", pm.response.responseTime, \"ms (2차가 더 빠르면 캐시 적용 추정, Redis Cache 로그/콘솔도 같이 확인)\");"
    language: text/javascript
order: 3000
