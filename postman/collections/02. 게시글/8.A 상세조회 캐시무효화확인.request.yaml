$kind: http-request
name: "A 게시글 상세조회 - 수정 내용 즉시 반영 확인 (캐시 무효화 검증)"
url: "{{baseUrl}}/api/v1/feeds/posts/{{postId}}"
method: GET
headers:
  Authorization: "Bearer {{userA_token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); }); pm.test(\"수정된 content가 즉시 보임 (캐시 무효화 성공)\", function () { pm.expect(pm.response.json().data.content).to.eql(\"수정된 게시글 내용입니다.\"); });"
    language: text/javascript
order: 8000
