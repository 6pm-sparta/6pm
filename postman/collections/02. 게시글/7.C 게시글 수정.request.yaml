$kind: http-request
name: C 게시글 수정
url: "{{baseUrl}}/api/v1/feeds/posts/{{postId}}"
method: PUT
headers:
  Authorization: "Bearer {{creatorC_token}}"
body:
  type: json
  content: "{\"content\": \"수정된 게시글 내용입니다.\", \"imageKeys\": []}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); }); pm.test(\"content 수정됨\", function () { pm.expect(pm.response.json().data.content).to.eql(\"수정된 게시글 내용입니다.\"); });"
    language: text/javascript
order: 7000
