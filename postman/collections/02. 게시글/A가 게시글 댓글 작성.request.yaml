$kind: http-request
name: A가 게시글 댓글 작성
url: "{{baseUrl}}/api/v1/feeds/posts/{{postId}}/comments"
method: POST
headers:
  Authorization: "Bearer {{userA_token}}"
  Content-Type: application/json
body:
  type: json
  content: "{\"content\": \"좋은 게시글이네요!\"}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 201\", function () { pm.response.to.have.status(201); }); pm.collectionVariables.set(\"commentId\", pm.response.json().data.commentId);"
    language: text/javascript
order: 6000
