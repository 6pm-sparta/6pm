$kind: http-request
url: "{{baseUrl}}/api/v1/orders/{{orderId}}"
method: GET
headers:
  Authorization: Bearer {{userA_token}}
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () { pm.response.to.have.status(200); }); const data = pm.response.json().data; pm.test("주문 상태는 CANCELLED", function () { pm.expect(data.status).to.eql("CANCELLED"); });
    language: text/javascript
order: 4000
