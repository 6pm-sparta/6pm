$kind: collection
name: 13. 좌석 선점 해제
description: |-
  A가 좌석을 선점했다가(선택) 결제 전에 해제하는(취소 선택) 흐름. "좌석 선택했다 말았다" 시나리오 — releaseHold()
  를 직접 검증하기 위한 컬렉션이다.

  1. 좌석 선점 → orderId 반환 확인
  2. 주문조회 — DB에서 PENDING 자동 생성 확인
  3. 좌석 선점 해제 요청 (DELETE .../seats/{seatId}/hold)
  4. 주문조회 — 주문 상태가 CANCELLED로 바뀌었는지 확인
  5. 좌석목록조회 — 해당 좌석이 다시 AVAILABLE로 보이는지 확인 (Redis 정상 복구)

  ## 정합성 버그 재현 (육안 확인용)
  현재 releaseHold()는 Redis 해제 → orderClient.cancel() 동기 Feign 순서로 동작한다(#155).
  장애 상황을 재현하려면:

  6. order-service 컨테이너를 내린 상태에서 3번(해제 요청)을 다시 호출
  7. 응답은 5xx(혹은 타임아웃)로 실패하지만, 5번(좌석목록조회)을 호출해보면 좌석은 이미 AVAILABLE로
     보임 — Redis는 풀렸는데 order-service의 주문은 그대로 PENDING으로 남는 정합성 깨짐을 직접 확인할 수 있다.
  8. order-service를 다시 올리고 주문조회(4번)를 재호출 — CANCELLED로 안 바뀌고 PENDING에 머물러
     있으면 버그가 재현된 것 (이 갭을 비동기 이벤트로 전환하는 게 후속 이슈 목표)

  ## 비동기 전환 후 확인 포인트 (이슈 반영 후)
  - Kafka UI(localhost:8090)에서 `ticketing.seat.hold.released` 토픽에 메시지가 발행되는지 확인
  - order-service 컨테이너를 내려도 3번(해제 요청)이 200으로 즉시 성공하는지 확인 (동기 의존 제거 검증)
variables:
  seatId: ""
