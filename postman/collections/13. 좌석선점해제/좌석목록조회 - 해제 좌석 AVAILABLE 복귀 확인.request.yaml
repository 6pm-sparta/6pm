$kind: http-request
url: "{{baseUrl}}/api/v1/tickets/shows/{{showId}}/seats"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{userA_token}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () { pm.response.to.have.status(200); }); const seats = pm.response.json().data; const released = seats.find(s => s.seatId === pm.collectionVariables.get("seatId")); pm.test("해제한 좌석이 AVAILABLE로 복귀함", function () { pm.expect(released.status).to.eql("AVAILABLE"); });
    language: text/javascript
order: 5000
