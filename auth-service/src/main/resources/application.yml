# auth-service/src/main/resources/application.yml — 표준 와이어링 기반 (DB 미포함)
# TODO: 포트 번호는 회의에서 서비스 구성 재논의 후 확정 (임시값 8087)
server:
  port: 8087

spring:
  application:
    name: auth-service
  config:
    import: "optional:configserver:http://localhost:8888"
  # auth-service는 자체 DB를 두지 않으므로 datasource / jpa 설정 없음

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# JWT 설정 (Access Token). HS256 대칭키.
# TODO: 운영 시 secret은 환경변수/Config Server로 분리 (평문 금지)
jwt:
  secret: ${JWT_SECRET:6pm-fandom-sns-temporary-dev-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiration: 1800000  # 30분 (ms)
