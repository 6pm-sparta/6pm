# =====================================================================
# Alertmanager — Prometheus 알림을 AIOps 서비스 웹훅으로 전달
# AIOps(:8086)가 받아서 Claude 분석 → incident_alert_history 적재 → Slack 발송
# (Slack 발송은 AIOps 서비스가 직접 하므로 여기선 webhook 하나만 둔다.)
# =====================================================================
route:
  receiver: aiops-webhook
  group_by: ["alertname", "application"]
  group_wait: 10s          # 같은 그룹 첫 알림 모으는 대기
  group_interval: 30s
  repeat_interval: 1h      # 미해소 시 재알림 주기
  routes:
    - matchers: [severity="critical"]
      receiver: aiops-webhook
      repeat_interval: 30m

receivers:
  - name: aiops-webhook
    webhook_configs:
      - url: "http://aiops-service:8086/api/v1/alerts/webhook"
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ["application"]
