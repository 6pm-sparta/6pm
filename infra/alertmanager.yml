# =====================================================================
# 6pm AIOps · Alertmanager 설정
# 저장 위치: 레포의 ./infra/alertmanager.yml
# 역할: Prometheus 가 보낸 알림을 묶어서 AIOps 웹훅으로 POST
# =====================================================================
route:
  receiver: aiops-webhook
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

receivers:
  - name: aiops-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:8086/api/v1/alerts/webhook'
        send_resolved: true