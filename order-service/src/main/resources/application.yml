server:
  port: 8084

spring:
  application:
    name: order-service

  config:
    import: "optional:configserver:http://localhost:8888"

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/fandom_db?currentSchema=order_db   # ← 본인 스키마
    username: root
    password: password
  jpa:
    hibernate: { ddl-auto: update }
    properties: { hibernate: { default_schema: order_db, format_sql: true } }   # ← 본인 스키마
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password: fandom_redis_pw

eureka:
  client: { service-url: { defaultZone: http://localhost:8761/eureka/ } }
  instance: { prefer-ip-address: true, instance-id: "${spring.application.name}:${random.uuid}" }
management:
  endpoints: { web: { exposure: { include: health, info, prometheus } } }
  tracing: { sampling: { probability: 1.0 } }
  zipkin: { tracing: { endpoint: http://localhost:9411/api/v2/spans } }
