# order-service/src/main/resources/application.yml — 표준 와이어링 (인프라 담당 제공)
server:
  port: 8084

spring:
  application:
    name: order-service
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/fandom_db?currentSchema=order_db
    username: root
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        default_schema: order_db
        format_sql: true
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:fandom_redis_pw}   # docker-compose redis requirepass와 동일
      # redisson-spring-boot-starter가 spring.data.redis.* 값을 그대로 읽어 단일 서버 모드로
      # RedissonClient를 자동 구성한다 (별도 redisson.yaml 불필요). 분산락 TTL 등 결제 요청
      # 전용 옵션은 OrderProperties처럼 타입세이프 설정으로 결제 요청 서비스 작업 시 추가한다.
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:sql/manual_migrations.sql

# 주문 생성 관련 커스텀 설정 (OrderProperties로 바인딩)
order:
  hold:
    claim-ttl-seconds: 30      # SETNX 1차 클레임 TTL — INSERT 끝날 때까지만 버티면 되는 짧은 값
    cache-ttl-seconds: 600     # {holdId:orderId} 최종 캐시 TTL — 임시값(10분).
    # TODO: Ticketing 좌석 선점 TTL과 반드시 맞춰야 함 (api 명세서 미확정 항목)
  expiration-minutes: 10      # 주문 PENDING → 타임아웃 취소 기준 (expired_at). P1 스케줄러 구현 전까지는 값만 저장됨

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
