server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: lb://USER-SERVICE
          # NOTE(임시): 회원가입 경로가 /api/v1/members, /api/v1/creators 로 분리돼 있어 함께 라우팅한다.
          # 추후 user-service 경로를 /api/v1/users/** 로 통일하는 리팩터링 시 정리한다.
          predicates:
            - Path=/api/v1/users/**,/api/v1/members/**,/api/v1/creators/**
        - id: feed-service
          uri: lb://FEED-SERVICE
          predicates:
            - Path=/api/v1/feeds/**
        - id: ticketing-service
          uri: lb://TICKETING-SERVICE
          predicates:
            - Path=/api/v1/tickets/**
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**
        - id: chat-service
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/api/v1/chats/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# JWT 설정 (Access Token 검증). auth-service와 동일한 secret/알고리즘이어야 검증이 성립한다.
# TODO: 운영 시 secret은 환경변수/Config Server로 분리 (평문 금지)
jwt:
  secret: ${JWT_SECRET:6pm-fandom-sns-temporary-dev-secret-key-must-be-at-least-32-bytes-long}

# UserIdCard HMAC 서명 키. 모든 도메인 서비스와 동일해야 검증이 성립한다.
# 원칙은 Config Server에서 공유받으며, 아래는 Config Server 미기동 시 로컬 폴백이다(config 값과 동일).
hmac:
  secret-key: ${HMAC_SECRET_KEY:6pm-fandom-sns-hmac-shared-secret-key-must-be-at-least-32-bytes-long}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted
