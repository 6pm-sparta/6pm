name: "🐛 버그 리포트"
description: "동작이 의도와 다를 때 보고합니다 (백엔드/인프라)"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "버그를 빠르게 재현할 수 있도록 아래 항목을 채워주세요. (프론트 없음 — API·로그 기준)"

  - type: dropdown
    id: service
    attributes:
      label: 관련 서비스/모듈
      description: 문제가 발생한 곳을 선택하세요.
      options:
        - gateway-service
        - eureka-server
        - config-server
        - user-service
        - feed-service
        - ticketing-service
        - order-service
        - notification-service
        - chat-service
        - aiops-service
        - common
        - infra (docker/CI/CD/DB)
        - 잘 모르겠음
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 버그 설명
      description: 무엇이 잘못되었는지 한두 줄로.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 순서대로 적어주세요. 가능하면 curl/HTTP 요청 예시 포함.
      placeholder: |
        1. POST /api/tickets 호출 (body: ...)
        2. ...
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: 기대 동작 vs 실제 동작
      placeholder: |
        기대: 201 Created + 예매 ID 반환
        실제: 500 + NullPointerException
    validations:
      required: true

  - type: input
    id: endpoint
    attributes:
      label: 관련 API / 엔드포인트
      placeholder: "예) POST /api/tickets/{id}/reserve"

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 스택트레이스 / Zipkin Trace ID
      description: 관련 로그나 분산 추적 ID를 붙여주세요. 자동으로 코드블록 처리됩니다.
      render: shell

  - type: dropdown
    id: env
    attributes:
      label: 발생 환경
      options:
        - 로컬 (docker compose)
        - dev
        - 운영(prod)
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 확인 사항
      options:
        - label: 동일한 이슈가 이미 있는지 검색했습니다.
          required: true
        - label: 인프라(DB/Redis/Kafka/Eureka)가 떠 있는 상태에서 재현했습니다.
