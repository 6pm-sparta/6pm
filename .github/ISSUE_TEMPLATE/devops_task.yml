name: "🔧 인프라 / DevOps 작업"
description: "VPC·CI/CD·모니터링·DB·배포 등 인프라 작업을 등록합니다"
title: "[INFRA] "
labels: ["infra"]
body:
  - type: markdown
    attributes:
      value: "관제 센터장 담당 영역. 작업 목적과 '완료 판정 기준'을 명확히 적어주세요."

  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      options:
        - VPC / 네트워크 / 보안그룹
        - CI/CD (GitHub Actions / 배포)
        - 모니터링·관측 (Prometheus/Grafana/Loki/Zipkin/Alert)
        - DB (RDS / 스키마 / 마이그레이션)
        - 메시징·캐시 (Kafka / Redis)
        - 시크릿 / 보안
        - 기타
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 목적 / 배경
      description: 무엇을 왜 하나요?
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 항목
      value: |
        - [ ]
        - [ ]

  - type: textarea
    id: done
    attributes:
      label: 완료 조건 / 검증 방법
      description: 어떻게 "됐다"를 확인하나요?
      placeholder: |
        - [ ] docker compose --profile infra up -d 정상
        - [ ] /actuator/health UP
        - [ ] main push 시 자동 배포 성공
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 영향 범위 / 롤백 방안
      placeholder: "영향 받는 서비스, 다운타임 여부, 문제 시 되돌리는 방법"

  - type: input
    id: ref
    attributes:
      label: 관련 문서 / 다이어그램 링크
      placeholder: "인프라 설계도 / PROJECT_CONTEXT 등"
