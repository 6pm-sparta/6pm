name: 🧪 6pm Fandom SNS - 개발 환경(Dev) CI

on:
  pull_request:
    branches: [ "develop" ] # develop 브랜치로 들어오는 PR에서만 작동

jobs:
  detect-changes:
    name: 🔍 변경된 마이크로서비스 폴더 감지
    runs-on: ubuntu-latest
    outputs:
      eureka: ${{ steps.filter.outputs.eureka }}
      gateway: ${{ steps.filter.outputs.gateway }}
      user: ${{ steps.filter.outputs.user }}
      ticketing: ${{ steps.filter.outputs.ticketing }}
      order: ${{ steps.filter.outputs.order }}
      feed: ${{ steps.filter.outputs.feed }}
      notification: ${{ steps.filter.outputs.notification }}
      aiops: ${{ steps.filter.outputs.aiops }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            eureka: 'eureka-server/**'
            gateway: 'gateway-service/**'
            user: 'user-service/**'
            ticketing: 'ticketing-service/**'
            order: 'order-service/**'
            feed: 'feed-service/**'
            notification: 'notification-service/**'
            aiops: 'aiops-service/**'

  # -----------------------------------------------------------------
  # 🔗 위에서 감지된 서비스만 1번 공통 템플릿(_service-ci.yml)을 호출하여 빌드
  # -----------------------------------------------------------------
  eureka-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.eureka == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'eureka-server'

  gateway-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'gateway-service'

  user-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.user == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'user-service'

  ticketing-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.ticketing == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'ticketing-service'

  order-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.order == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'order-service'

  feed-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.feed == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'feed-service'

  notification-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.notification == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'notification-service'

  aiops-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.aiops == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'aiops-service'