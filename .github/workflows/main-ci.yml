name: 🚀 6pm Fandom SNS - 운영 환경(Main) CI/CD

on:
  push:
    branches: [ "main" ] # main 브랜치에 정식 병합(Merge) 되었을 때 가동

jobs:
  detect-changes:
    name: 🔍 변경된 운영 배포 대상 감지
    runs-on: ubuntu-latest
    outputs:
      user: ${{ steps.filter.outputs.user }}
      ticketing: ${{ steps.filter.outputs.ticketing }}
      # ... (추후 필요한 배포 대상만 추가 가동)
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user: 'user-service/**'
            ticketing: 'ticketing-service/**'

  # [1단계] 운영 통합 빌드 검증 (함수 호출)
  user-production-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.user == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'user-service'

  ticketing-production-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.ticketing == 'true'
    uses: ./.github/workflows/_service-ci.yml
    with:
      service-name: 'ticketing-service'

  # [2단계] 👑 준영님이 나중에 연결할 AWS CD 영역 (배포 자동화)
  deploy:
    name: 🚢 AWS 클라우드 운영 서버 최종 배포
    needs: [user-production-build, ticketing-production-build]
    if: always() # 빌드 검증이 완료되면 가동
    runs-on: ubuntu-latest
    steps:
      - name: 📢 배포 파이프라인 스케줄링 확인
        run: echo "안전성 빌드가 완료되었습니다. 다음 Phase에서 Docker Build 및 AWS ECR Push 스크립트가 이곳에 연동됩니다."