name: 📦 개별 서비스 빌드 템플릿

# 다른 워크플로우에서 호출할 수 있도록 개방 (workflow_call)
on:
  workflow_call:
    inputs:
      service-name:
        description: '빌드할 마이크로서비스 폴더명'
        required: true
        type: string

jobs:
  build:
    name: 🏗️ ${{ inputs.service-name }} 빌드 및 테스트
    runs-on: ubuntu-latest
    steps:
      - name: 📥 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 21 환경 세팅 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # ⚡ 빌드 속도를 비약적으로 올리는 그래들 캐싱

      - name: 🔑 루트 실행기(gradlew) 권한 부여
        run: chmod +x ./gradlew

      - name: 🧪 특정 모듈만 조준 사격 빌드
        # 예: ./gradlew :user-service:build 명령어가 실행됩니다.
        run: ./gradlew :${{ inputs.service-name }}:build