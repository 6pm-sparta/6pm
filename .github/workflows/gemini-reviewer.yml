name: 🤖 Gemini PR Code Reviewer

on:
  pull_request:
    # PR 생성 초기에만 리뷰한다(커밋 push마다 재호출되던 synchronize 제거 → API 호출량 절감).
    types: [opened, reopened]
    paths-ignore:
      - 'docs/**'

jobs:
  review:
    name: 🧐 Gemini 코드 리뷰 진행 중...
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 PR Diff(변경된 코드) 추출
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt

      - name: 🧠 Gemini API 호출 및 리뷰 댓글 작성
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite   # 무료 한도 여유있는 모델(RPD 500). 2.5-flash는 RPD 20으로 429 빈발.
          REVIEW_PROMPT: |
            너는 6pm Fandom SNS 프로젝트의 엄격한 Spring Boot MSA 수석 아키텍트야.
            아래 제공된 Git Diff 코드를 리뷰하고, 한국어로 친절하지만 단호하게 피드백을 남겨줘.
            아래 체크리스트는 Diff에 해당되는 항목만 언급하고, 해당 없으면 항목 자체를 언급하지 마.

            [필수 체크리스트]
            1. 컨트롤러 반환 타입이 우리가 만든 공통 규격인 'ApiResponse<T>'를 사용했는가?
            2. 에러를 던질 때 일반 Exception이 아닌 'CustomException'과 'ErrorCode'를 사용했는가?
            3. 비밀번호, API 키, DB 접속 정보 등이 하드코딩 되어 노출되지 않았는가?
            4. 불필요한 반복문이나 N+1 문제가 발생할 여지가 있는가?

            체크리스트 외에도 변경된 코드의 핵심 목적을 파악하고, 설계 및 구현 관점에서 개선점을 자유롭게 제안해줘.

            리뷰 형식은 마크다운을 사용하고, 잘한 점도 한 줄 정도 칭찬해 줘.

            [Git Diff 코드]
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr_diff.txt', 'utf8');

            if (diff.trim().length < 10) {
              console.log("리뷰할 코드가 부족합니다. (diff 없음)");
              return;
            }

            const promptText = process.env.REVIEW_PROMPT + "\n" + diff;
            const model = process.env.GEMINI_MODEL;

            // ✅ v1beta + 현재 모델. 키는 URL 쿼리스트링 대신 헤더로 전달(노출 최소화).
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

            // 일시적 오류(429 한도/503 과부하)는 지수 백오프로 재시도한다.
            // 재시도로 흡수되지 않은 경우에만 아래에서 실패 처리한다.
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const RETRYABLE = [429, 500, 502, 503, 504];
            const MAX_ATTEMPTS = 4;

            const callGemini = async () => {
              return await fetch(url, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-goog-api-key': process.env.GEMINI_API_KEY
                },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: promptText }] }]
                })
              });
            };

            let response;
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              response = await callGemini();
              if (response.ok || !RETRYABLE.includes(response.status)) {
                break; // 성공했거나, 재시도해도 소용없는 오류(4xx 등)면 중단
              }
              if (attempt < MAX_ATTEMPTS) {
                const waitMs = 2000 * Math.pow(2, attempt - 1); // 2s, 4s, 8s
                console.log(`Gemini ${response.status} 응답, ${waitMs}ms 후 재시도 (${attempt}/${MAX_ATTEMPTS - 1})`);
                await sleep(waitMs);
              }
            }

            // ❗ 재시도 후에도 실패하면 job을 빨간불로. (단, 브랜치 보호 규칙에서 required check 제외 → PR 머지는 막지 않음)
            if (!response.ok) {
              const errorText = await response.text();
              core.setFailed("Gemini API Error (" + response.status + "): " + errorText);
              return;
            }

            const result = await response.json();
            const reviewComment = result?.candidates?.[0]?.content?.parts?.[0]?.text;

            // 안전필터 등으로 응답이 비면 방어
            if (!reviewComment) {
              core.setFailed("리뷰 텍스트가 비어있음: " + JSON.stringify(result));
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "### 🤖 관제탑 AI (Gemini) 자동 코드 리뷰 결과\n\n" + reviewComment
            });