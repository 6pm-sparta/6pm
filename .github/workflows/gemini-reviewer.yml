name: 🤖 Gemini PR Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: 🧐 Gemini 코드 리뷰 진행 중...
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 소스코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 PR Diff(변경된 코드) 추출
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt

      - name: 🧠 Gemini API 호출 및 리뷰 댓글 작성
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REVIEW_PROMPT: |
            너는 6pm Fandom SNS 프로젝트의 엄격한 Spring Boot MSA 수석 아키텍트야.
            아래 제공된 Git Diff 코드를 리뷰하고, 한국어로 친절하지만 단호하게 피드백을 남겨줘.
            
            [필수 체크리스트]
            1. 컨트롤러 반환 타입이 우리가 만든 공통 규격인 'ApiResponse<T>'를 사용했는가?
            2. 에러를 던질 때 일반 Exception이 아닌 'CustomException'과 'ErrorCode'를 사용했는가?
            3. 비밀번호, API 키, DB 접속 정보 등이 하드코딩 되어 노출되지 않았는가?
            4. 불필요한 반복문이나 N+1 문제가 발생할 여지가 있는가?
            
            리뷰 형식은 마크다운을 사용하고, 잘한 점도 한 줄 정도 칭찬해 줘.
            
            [Git Diff 코드]
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr_diff.txt', 'utf8');
            
            if (diff.trim().length < 10) {
              console.log("리뷰할 코드가 부족합니다.");
              return;
            }

            const promptText = process.env.REVIEW_PROMPT + "\n" + diff;
            
            // 🚨 가장 안정적이고 100% 작동하는 범용 모델 'gemini-pro'로 변경했습니다.
            const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + process.env.GEMINI_API_KEY;

            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: promptText }] }]
              })
            });

            if (!response.ok) {
              const errorText = await response.text();
              console.error("Gemini API Error:", errorText);
              return;
            }

            const result = await response.json();
            const reviewComment = result.candidates[0].content.parts[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "### 🤖 관제탑 AI (Gemini) 자동 코드 리뷰 결과\n\n" + reviewComment
            });